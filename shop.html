<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS ANIMA | UNIT_RECRUITMENT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@200;300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* ══ NEXUS DESIGN SYSTEM ══ */
    :root {
      --neon:      #c8a84b;
      --neon-rgb:  200,168,75;
      --neon-glow: rgba(200,168,75,.7);
      --neon-dim:  rgba(200,168,75,.18);
      --white:     #ede8df;
      --dark:      #080603;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; min-height:100vh; background:var(--dark); color:var(--white); font-family:'Share Tech Mono',monospace; cursor:none; }

    /* ── CURSOR ── */
    #cur { position:fixed; z-index:9999; pointer-events:none; width:18px; height:18px; border:1px solid rgba(var(--neon-rgb),.65); transform:translate(-50%,-50%) rotate(45deg); transition:border-color .4s; }
    #cur::after { content:''; position:absolute; top:50%; left:50%; width:3px; height:3px; background:var(--neon); transform:translate(-50%,-50%) rotate(-45deg); }

    /* ── BACKGROUND ── */
    #bg { position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 90% 80% at 75% 55%, rgba(20,14,4,.97) 0%,transparent 65%), radial-gradient(ellipse 70% 90% at 15% 45%, rgba(10,7,2,.96) 0%,transparent 60%), linear-gradient(160deg,#0c0803 0%,#080502 50%,#060401 100%); }
    #atm { position:fixed; inset:0; z-index:1; pointer-events:none; background: radial-gradient(ellipse 50% 60% at 78% 50%, rgba(var(--neon-rgb),.055) 0%,transparent 55%), radial-gradient(ellipse 30% 35% at 20% 75%, rgba(var(--neon-rgb),.03) 0%,transparent 45%); animation:atm 18s ease-in-out infinite; }
    @keyframes atm { 0%,100%{opacity:1} 50%{opacity:.55} }
    #grain { position:fixed; inset:-100%; width:300%; height:300%; z-index:2; pointer-events:none; opacity:.038; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E"); animation:grain .38s steps(1) infinite; }
    @keyframes grain { 0%{transform:translate(0,0)} 25%{transform:translate(-2%,3%)} 50%{transform:translate(3%,-2%)} 75%{transform:translate(-1%,-3%)} }
    #scan { position:fixed; inset:0; z-index:2; pointer-events:none; opacity:.03; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.5) 3px,rgba(0,0,0,.5) 4px); }
    .aline { position:fixed; left:0; right:0; height:1px; z-index:3; pointer-events:none; }
    .aline.t { top:0;    background:linear-gradient(90deg,transparent,rgba(var(--neon-rgb),.3),transparent); }
    .aline.b { bottom:0; background:linear-gradient(90deg,transparent,rgba(var(--neon-rgb),.15),transparent); }

    /* ── CORNER BRACKETS ── */
    .cor { position:fixed; width:16px; height:16px; border-color:rgba(var(--neon-rgb),.3); border-style:solid; z-index:11; pointer-events:none; }
    .cor.tl { top:22px; left:22px; border-width:1px 0 0 1px; }
    .cor.tr { top:22px; right:22px; border-width:1px 1px 0 0; }
    .cor.bl { bottom:22px; left:22px; border-width:0 0 1px 1px; }
    .cor.br { bottom:22px; right:22px; border-width:0 1px 1px 0; }

    /* ── TOP HUD ── */
    #hud { position:fixed; top:0; left:0; right:0; height:52px; z-index:12; display:flex; align-items:center; justify-content:space-between; padding:0 28px; background:rgba(8,6,3,.7); backdrop-filter:blur(2px); border-bottom:1px solid rgba(var(--neon-rgb),.08); }
    .hud-l { font-size:8px; letter-spacing:3.5px; color:rgba(var(--neon-rgb),.35); text-transform:uppercase; }
    .hud-r { display:flex; align-items:center; gap:14px; }
    .hud-dot { width:5px; height:5px; border-radius:50%; background:var(--neon); box-shadow:0 0 7px var(--neon); animation:hdot 2.4s ease-in-out infinite; }
    @keyframes hdot { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── GEM DISPLAY (HUD) ── */
    .gem-hud { display:flex; align-items:center; gap:10px; }
    .gem-hud-label { font-size:8px; letter-spacing:2px; color:rgba(var(--neon-rgb),.4); }
    .gem-hud-value { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--neon); text-shadow:0 0 10px var(--neon-glow); }
    .gem-sep { width:1px; height:20px; background:rgba(var(--neon-rgb),.2); }

    /* ── BACK BUTTON ── */
    .nx-btn {
      display:inline-flex; align-items:center; gap:10px;
      background:none; border:none; cursor:none; text-decoration:none;
      font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:4px;
      color:rgba(var(--neon-rgb),.35); text-transform:uppercase; padding:6px 0;
      transition:color .18s ease;
    }
    .nx-btn .btn-slab { width:0; height:0; background:var(--neon); box-shadow:0 0 12px var(--neon); transition:width .15s cubic-bezier(.9,0,.1,1),height .15s cubic-bezier(.9,0,.1,1); flex-shrink:0; }
    .nx-btn:hover { color:var(--neon); }
    .nx-btn:hover .btn-slab { width:4px; height:18px; }

    .purchase-link {
      display:inline-flex; align-items:center; gap:8px;
      font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:3px;
      color:rgba(var(--neon-rgb),.5); text-decoration:none; text-transform:uppercase;
      border:1px solid rgba(var(--neon-rgb),.25); padding:4px 14px;
      transition:color .18s, border-color .18s, box-shadow .18s;
    }
    .purchase-link:hover { color:var(--neon); border-color:var(--neon); box-shadow:0 0 14px rgba(var(--neon-rgb),.2); }

    /* ── PAGE LAYOUT ── */
    #page { position:relative; z-index:10; padding:70px 28px 80px; max-width:1120px; margin:0 auto; }

    /* ── PAGE HEADER ── */
    .page-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:44px; padding-bottom:16px; border-bottom:1px solid rgba(var(--neon-rgb),.1); }
    .page-header-left {}
    .page-eyebrow { font-size:9px; letter-spacing:5px; color:rgba(var(--neon-rgb),.4); text-transform:uppercase; margin-bottom:4px; }
    .page-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(36px,5vw,56px); letter-spacing:6px; color:var(--white); text-shadow:-2px 0 0 rgba(var(--neon-rgb),.2); line-height:1; }

    /* ── SHOP GRID ── */
    #shop-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
      gap:24px;
    }

    /* ── UNIT CARD ── */
    .card {
      position:relative;
      background:rgba(10,8,4,.85);
      border:1px solid rgba(var(--neon-rgb),.18);
      display:flex; flex-direction:column;
      transition:border-color .2s, transform .2s, box-shadow .2s;
      overflow:hidden;
    }
    /* top glow bar */
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(var(--neon-rgb),.5),transparent); opacity:.6;
    }
    /* corner bracket TL */
    .card::after {
      content:''; position:absolute; top:-2px; left:-2px;
      width:10px; height:10px; border:2px solid var(--neon);
      border-right:none; border-bottom:none; opacity:0; transition:opacity .2s;
    }
    .card:hover { border-color:var(--neon); transform:translateY(-6px); box-shadow:0 20px 50px rgba(var(--neon-rgb),.16); }
    .card:hover::after { opacity:1; }

    /* scan overlay on hover */
    .card-scan {
      position:absolute; inset:0; pointer-events:none; z-index:1;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px);
      opacity:0; transition:opacity .2s;
    }
    .card:hover .card-scan { opacity:1; }

    .img-wrapper { width:100%; height:210px; background:#000; overflow:hidden; border-bottom:1px solid rgba(var(--neon-rgb),.12); }
    .card img { width:100%; height:100%; object-fit:cover; filter:grayscale(.45) contrast(1.15); transition:.45s; }
    .card:hover img { filter:grayscale(0) contrast(1.05); transform:scale(1.04); }

    .card-content { padding:18px 18px 0; flex:1; }

    /* name with left slab — Wesker style */
    .card-name-wrap { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .card-slab { width:3px; height:20px; background:var(--neon); box-shadow:0 0 12px var(--neon); flex-shrink:0; }
    .card h3 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--white); }

    .stats-row {
      display:grid; grid-template-columns:1fr 1fr 1fr;
      gap:4px; margin-bottom:12px;
      background:rgba(0,0,0,.3); padding:10px;
      font-size:9px; letter-spacing:2px;
      color:rgba(var(--neon-rgb),.6);
    }

    .price-box { font-size:9px; letter-spacing:3px; color:rgba(var(--neon-rgb),.5); margin-bottom:16px; }
    .price-box span { color:var(--neon); font-family:'Bebas Neue',sans-serif; font-size:16px; }

    /* ── RECRUIT BUTTON ── */
    .recruit-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      background:none; border-top:1px solid rgba(var(--neon-rgb),.15);
      color:rgba(var(--neon-rgb),.35);
      font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:4px;
      padding:14px; width:100%; cursor:none;
      text-transform:uppercase; transition:all .18s ease;
      position:relative; z-index:2;
    }
    .recruit-btn .rbtn-slab { width:0; height:0; background:var(--neon); box-shadow:0 0 16px var(--neon); transition:width .15s cubic-bezier(.9,0,.1,1),height .15s cubic-bezier(.9,0,.1,1); flex-shrink:0; }
    .card:hover .recruit-btn { color:var(--neon); border-top-color:rgba(var(--neon-rgb),.3); }
    .card:hover .recruit-btn .rbtn-slab { width:4px; height:18px; }

    /* Owned state */
    .recruit-btn.owned-tag { color:rgba(var(--neon-rgb),.18) !important; cursor:default !important; }
    .recruit-btn.owned-tag .rbtn-slab { display:none; }

    /* ── FLASH ── */
    #flash { position:fixed; inset:0; z-index:50; pointer-events:none; background:rgba(var(--neon-rgb),0); transition:background .09s ease; }
    #flash.f { background:rgba(var(--neon-rgb),.09); }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="bg"></div>
<div id="atm"></div>
<div id="grain"></div>
<div id="scan"></div>
<div class="aline t"></div>
<div class="aline b"></div>
<div id="flash"></div>

<div class="cor tl"></div>
<div class="cor tr"></div>
<div class="cor bl"></div>
<div class="cor br"></div>

<!-- ── HUD ── -->
<div id="hud">
  <div class="hud-l">NEXUS ANIMA &nbsp;·&nbsp; UNIT DATABASE</div>
  <div class="hud-r">
    <div class="gem-hud">
      <span class="gem-hud-label">GEMS</span>
      <span class="gem-hud-value" id="gem-balance">0</span>
    </div>
    <div class="gem-sep"></div>
    <a href="purchase.html" class="purchase-link">[ + ] RECHARGE</a>
    <div class="gem-sep"></div>
    <a class="nx-btn" href="game.html">
      <div class="btn-slab"></div>
      <span>← MENU</span>
    </a>
    <div class="hud-dot"></div>
  </div>
</div>

<!-- ── PAGE ── -->
<div id="page">
  <div class="page-header">
    <div class="page-header-left">
      <div class="page-eyebrow">Nexus Studios // Archive V4</div>
      <div class="page-title">UNIT_DATABASE</div>
    </div>
  </div>

  <div id="shop-grid"></div>
</div>

<script type="module">
  /* ── Cursor ── */
  const cur = document.getElementById('cur');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });

  /* ── Neon Cycle ── */
  const NEONS = [
    { hex:'#c8a84b', rgb:'200,168,75' },
    { hex:'#00f5ff', rgb:'0,245,255'  },
    { hex:'#ff2244', rgb:'255,34,68'  },
    { hex:'#bc13fe', rgb:'188,19,254' },
    { hex:'#39ff14', rgb:'57,255,20'  },
    { hex:'#ff8c00', rgb:'255,140,0'  },
    { hex:'#ffffff', rgb:'255,255,255'},
  ];
  let neonIdx = 0;
  function applyNeon(n) {
    const r = document.documentElement;
    r.style.setProperty('--neon',      n.hex);
    r.style.setProperty('--neon-rgb',  n.rgb);
    r.style.setProperty('--neon-glow', `rgba(${n.rgb},.7)`);
    r.style.setProperty('--neon-dim',  `rgba(${n.rgb},.18)`);
  }
  applyNeon(NEONS[0]);
  setInterval(() => { neonIdx = (neonIdx+1) % NEONS.length; applyNeon(NEONS[neonIdx]); }, 2000);

  /* ── Flash ── */
  const flash = document.getElementById('flash');
  function doFlash() { flash.classList.add('f'); setTimeout(() => flash.classList.remove('f'), 130); }

  /* ══ ALL ORIGINAL JS LOGIC BELOW — UNTOUCHED ══ */
  import { CHARACTERS } from './script/data.js';

  let balance = parseInt(localStorage.getItem('userGems')) || 0;
  const balanceDisplay = document.getElementById('gem-balance');

  function updateUI() {
    balanceDisplay.innerText = balance.toLocaleString();
    localStorage.setItem('userGems', balance);
    renderShop();
  }

  window.buyCharacter = (id) => {
    const char = CHARACTERS.find(c => c.id === id);
    let owned = JSON.parse(localStorage.getItem('ownedCharacters')) || [0, 1, 2];
    const price = char.price || 500;
    if (owned.includes(id)) return;
    if (balance >= price) {
      balance -= price;
      owned.push(id);
      localStorage.setItem('ownedCharacters', JSON.stringify(owned));
      updateUI();
      const btn = event.target.closest('.recruit-btn');
      if (btn) btn.innerText = "SYNCED";
      doFlash();
    } else {
      alert("SYSTEM_ERROR: INSUFFICIENT_GEMS");
    }
  };

  function renderShop() {
    const shopGrid = document.getElementById('shop-grid');
    let owned = JSON.parse(localStorage.getItem('ownedCharacters')) || [0, 1, 2];

    shopGrid.innerHTML = CHARACTERS.map(char => {
      const isOwned = owned.includes(char.id);
      const btnText  = isOwned ? "UNIT_ACTIVE" : "INITIALIZE RECRUIT";
      const btnClass = isOwned ? "recruit-btn owned-tag" : "recruit-btn";

      return `
      <div class="card">
        <div class="card-scan"></div>
        <div class="img-wrapper">
          <img src="${char.img}" alt="${char.name}" onerror="this.src='https://via.placeholder.com/240x200/080603/c8a84b?text=DATA+MISSING'">
        </div>
        <div class="card-content">
          <div class="card-name-wrap">
            <div class="card-slab"></div>
            <h3>${char.name}</h3>
          </div>
          <div class="stats-row">
            <div>HP_${char.hp}</div>
            <div>ATK_${char.atk}</div>
            <div>SPD_${char.spd}</div>
          </div>
          <div class="price-box">COST &nbsp;<span>${char.price || 500}</span> GEMS</div>
        </div>
        <button class="${btnClass}" onclick="buyCharacter(${char.id})">
          <div class="rbtn-slab"></div>
          <span>${btnText}</span>
        </button>
      </div>`;
    }).join('');
  }

  updateUI();
</script>
</body>
</html>
